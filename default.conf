server {
    listen 8080;
    server_name localhost;

    root ./www;
    index index.html;

    client_max_body_size 3000000;

    error_page 404 error_page/404.html;
    error_page 403 error_page/403.html;
    error_page 405 error_page/405.html;
    error_page 500 error_page/500.html;

    location / {
        allowed_methods GET;
        autoindex off;
    }

    location /images {
        allowed_methods GET;
        autoindex on;
    }

    location /uploads {
        allowed_methods GET POST DELETE;
        autoindex on;
    }

    location /error_page {
        allowed_methods GET;
        autoindex on;
    }

    location /cgi {
        allowed_methods GET;
        cgi_extension .py .php;
    }
}

server {
    listen 8081;
    server_name tetris;
    root ./www/tetris;
    index tetris.html

    error_page 404 error_page/404.html;
    error_page 500 error_page/500.html;

    location / {
        allowed_methods GET;
        autoindex off;
    }

    location /images {
        autoindex on;
    }

    location /uploads {
        autoindex off;
    }

    location /error_page {
        allowed_methods GET;
        autoindex off;
    }

    location /cgi {
        allowed_methods GET POST;
        cgi_extension .py .php .js .cpp;
    }
}

server {
    listen 1025;
    server_name localhost3;
    root ./snus/snus/velo;
