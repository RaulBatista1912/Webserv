<!DOCTYPE html>
<html lang="en">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>ServWeb</title>
	<link rel="icon" type="image/gif" href="images/glorp-slam.gif">
	<link rel="stylesheet" href="style.css">
</head>
<body>
	<header class="site-header">
		<h1>Webserv</h1>
		<p class="subtitle"> Serveur en Snus </p>
	</header>
	<main class="container">
		<section class="card">
			<img src="images/rat.jpg" alt="chips" class="hero-image">
			<!--POST TEXT--------->
			<form action="/test.txt" method="post" class="glorp-form">
					<label for="glo">glorp ?</label>
				<input 
					type="text"
					id="glo"
					name="glo"
					placeholder="ékri frr"
					required
				>
				<div class="actions">
					<button type="submit" class="main-button">POST</button>
					<button type="submit" formmethod="get" formaction="/index.html" class="main-button secondary">GET</button>
				</div>
			</form>
			<!--UPLOAD FILES------->
			<form action="/uploads" method="post" enctype="multipart/form-data" class="glorp-form">
				<input type="file" name="file">
				<button type="submit" class="main-button">Upload</button>
			</form>
			<div class="extra-actions">
				<button type="button" class="main-button secondary">dede</button>
				<a href="/images/rat.jpg" download class="main-button link-button">Download rat</a>
			</div>
			<a href="http://www.savewalterwhite.com/" target="_blank" rel="noopener noreferrer">
				<button type="button" class="ww-button">Walter White</button>
			</a>
		</section>
	</main>
	<script src="app.js"></script>
</body>
</html>
